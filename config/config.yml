# config/config.yml
# MOSAIC v2 — Latent Trajectory Analysis

dataset:
  ingestion_dir: results/ingestion

preprocessing:
  missing_value_threshold: 0.2
  top_mad_features:
    rna: 5000
    proteomics: 5000
    phospho: 6000
  scale: true  # z-score per feature across all 204 samples (tumour + normal together)

mofa:
  n_factors: 20
  n_seeds: 5
  random_seeds: [42, 1, 2, 3, 4]
  max_iter: 1000
  convergence_mode: fast  # options: fast, medium, slow
  ard_r2_threshold: 0.01      # drop factors whose total R² across all views is below this  
  likelihoods:
    rna: gaussian
    proteomics: gaussian
    phospho: gaussian

clustering:
  k_range: [2, 3, 4, 5, 6]   # values tested in Stage 06 diagnostics (silhouette, GMM AIC/BIC)
  n_init: 100                  # K-means restarts; GMM uses n_init=10 internally
  random_state: 42

  # How the final clustering model is chosen (see README, "Clustering workflow"):
  #   manual    — use clustering.manual below (default; reproduces the course report)
  #   automatic — pick k by highest silhouette on clustering.automatic.representation
  clustering_parameter_selection: manual

  manual:
    k: 3                       # final number of clusters (report default: 3)
    method: kmeans             # "kmeans" or "gmm"
  # ΔZ representation for clustering (Stage 06 fits the model in this space):
  #   raw_all    — raw ΔZ, all MOFA factors
  #   raw_nof1   — raw ΔZ, Factor1 (tumour–normal axis) excluded
  #   norm_all   — L2-normalised ΔZ, all factors (report default)
  #   norm_nof1  — L2-normalised ΔZ, Factor1 excluded
    representation: norm_all

  automatic:
    strategy: silhouette       # only "silhouette" is currently supported
    method: kmeans
    representation: norm_all

  # Stage 06.1 only: which Stage 05 PCA/UMAP embedding to colour by cluster assignment.
  # Does not affect cluster labels — change clustering.manual.representation for that.
  visualization_representation: norm_all

interpretation:
  top_n_weights: 25
  gsea_libraries:
    - MSigDB_Hallmark_2020
    - KEGG_2021_Human
  gsea_gene_sets:
    - MSigDB_Hallmark_2020
    - KEGG_2021_Human
  gsea_min_size: 15
  gsea_max_size: 500
  gsea_permutations: 1000
  gsea_fdr_threshold: 0.1
  de_fdr_threshold: 0.05
  gene_set_cache_dir: data/gmt

clinical:
  survival_time_col: overall_survival_days
  survival_event_col: overall_survival_event
  mutation_cols:
    - KRAS_mutation
    - EGFR_mutation
    - TP53_mutation
    - ALK_fusion

dimensionality_reduction:
  umap:
    n_neighbors: 15
    min_dist: 0.1
    random_state: 42
  pca:
    random_state: 42

figures:
  dpi: 300
  format: pdf
  cluster_palette: tab10

paths:
  results: results
  figures: figures
  data: data
  report: report
  presentation: presentation